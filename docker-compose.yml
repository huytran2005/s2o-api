version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: s2o-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: s2o_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - s2o-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: s2o-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - s2o-network

  redis:
    image: redis:7
    container_name: s2o-redis
    ports:
      - "6379:6379"
    networks:
      - s2o-network

  api:
    image: s2o-api:test
    build: .
    container_name: s2o-api
    ports:
      - "10000:10000"
    env_file:
      - .env.docker
    environment:
      BASE_URL: http://localhost:10000
      REDIS_HOST: redis         # 🔥 thêm cho rõ ràng
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started   # 🔥 thêm redis
    networks:
      - s2o-network

networks:
  s2o-network:
    driver: bridge

volumes:
  postgres_data: